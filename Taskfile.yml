version: "3"

vars:
  SUPABASE_PROJECT_REF: '{{.SUPABASE_PROJECT_REF | default "iaurojpexxyynfggqgbx"}}'

tasks:
  # ── Supabase Setup ──────────────────────────────────────────────
  supabase:init:
    desc: Initialize Supabase locally
    cmd: npx supabase init

  supabase:link:
    desc: Link to remote Supabase project
    cmd: npx supabase link --project-ref {{.SUPABASE_PROJECT_REF}}

  supabase:login:
    desc: Authenticate with Supabase
    cmd: npx supabase login

  # ── Database ────────────────────────────────────────────────────
  "db:migration:new":
    desc: "Create a new migration file (usage: task db:migration:new NAME=my_migration)"
    requires:
      vars: [NAME]
    cmd: npx supabase migration new {{.NAME}}

  db:push:
    desc: Push migrations to remote database
    cmd: npx supabase db push

  db:status:
    desc: List migration status
    cmd: npx supabase migration list

  # ── Edge Functions ──────────────────────────────────────────────
  functions:new:
    desc: "Scaffold a new Edge Function (usage: task functions:new NAME=my_function)"
    requires:
      vars: [NAME]
    cmd: npx supabase functions new {{.NAME}}

  functions:deploy:
    desc: "Deploy a specific Edge Function (usage: task functions:deploy NAME=submit-score)"
    requires:
      vars: [NAME]
    cmd: npx supabase functions deploy {{.NAME}}

  "functions:deploy:all":
    desc: Deploy all Edge Functions
    cmd: npx supabase functions deploy

  functions:list:
    desc: List deployed Edge Functions
    cmd: npx supabase functions list

  # ── GitHub ──────────────────────────────────────────────────────
  gh:secrets:
    desc: Set GitHub repo secrets (interactive)
    cmds:
      - echo "Setting SUPABASE_URL..."
      - gh secret set SUPABASE_URL
      - echo "Setting SUPABASE_ANON_KEY..."
      - gh secret set SUPABASE_ANON_KEY

  "gh:pages:enable":
    desc: Enable GitHub Pages with Actions source
    cmd: gh api repos/{owner}/{repo}/pages -X POST -f build_type=workflow || gh api repos/{owner}/{repo}/pages -X PUT -f build_type=workflow

  gh:deploy:
    desc: Trigger the deploy workflow
    cmd: gh workflow run deploy.yml

  # ── Development ─────────────────────────────────────────────────
  dev:
    desc: Run local dev server
    cmd: npm run dev

  build:
    desc: Build for production
    cmd: npm run build

  typecheck:
    desc: Run TypeScript type checking
    cmd: npm run typecheck
